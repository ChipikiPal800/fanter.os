

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter | fantarena</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Ubuntu', sans-serif; background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); min-height: 100vh; color: white; }
    .fantarena-container { display: flex; height: 100vh; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 260px; background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); border-right: 1px solid rgba(45, 90, 227, 0.3); display: flex; flex-direction: column; padding: 20px 0; }
    .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { color: #ffcc00; font-family: 'Orbitron'; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .server-list { padding: 20px; }
    .server-item { padding: 10px 15px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.7); }
    .server-item:hover, .server-item.active { background: rgba(45, 90, 227, 0.3); color: white; }
    .server-item.active { border-left: 3px solid #ffcc00; }
    
    /* Main Chat */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
    .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .chat-header h3 { font-family: 'Orbitron'; color: #ffcc00; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; align-items: flex-start; gap: 12px; }
    .message-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
    .message-content { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 12px; max-width: 70%; }
    .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .message-name { font-weight: bold; color: #ffcc00; }
    .message-time { font-size: 10px; color: rgba(255,255,255,0.4); }
    .message-text { color: rgba(255,255,255,0.9); word-break: break-word; }
    .message-input-container { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    #messageInput { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; }
    #messageInput:focus { border-color: #ffcc00; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 30px; padding: 14px 28px; color: white; font-weight: bold; cursor: pointer; }
    
    /* Members Sidebar */
    .members-sidebar { width: 240px; background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); border-left: 1px solid rgba(45, 90, 227, 0.3); padding: 20px; }
    .members-header { margin-bottom: 20px; color: #ffcc00; font-family: 'Orbitron'; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; color: rgba(255,255,255,0.8); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .status-dot.offline { background: #666; }
  </style>
</head>
<body>
  <div class="fantarena-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>🏟️ FANTARENA</h2>
      </div>
      <div class="server-list">
        <div class="server-item active" data-channel="general">
          <span>💬</span> general
        </div>
        <div class="server-item" data-channel="game-recs">
          <span>🎮</span> game-recs
        </div>
        <div class="server-item" data-channel="lfg">
          <span>👥</span> looking-for-group
        </div>
        <div class="server-item" data-channel="flex">
          <span>🏆</span> achievement-flex
        </div>
      </div>
      <div style="margin-top: auto; padding: 20px;">
        <button onclick="window.location.href='index.html'" class="send-btn" style="width:100%; padding:10px;">← back to games</button>
      </div>
    </div>
    
    <!-- Main Chat -->
    <div class="chat-main">
      <div class="chat-header">
        <h3># <span id="channelName">general</span></h3>
      </div>
      <div class="messages-container" id="messagesContainer">
        <div style="text-align:center; color:rgba(255,255,255,0.4);">loading messages...</div>
      </div>
      <div class="message-input-container">
        <input type="text" id="messageInput" placeholder="send a message..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
    </div>
    
    <!-- Members Sidebar -->
    <div class="members-sidebar">
      <div class="members-header">
        <span>👥 members</span>
        <span style="float:right;" id="onlineCount">0 online</span>
      </div>
      <div id="membersList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase setup
    const SUPABASE_URL = "https://gvzgnclowylrrpovdvtw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emduY2xvd3lscnJwb3ZkdnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjM5ODEsImV4cCI6MjA5MjAzOTk4MX0.p7oeYBVX870iSK-TLDRj6pfW7wLj7HJsTHjNWaNpL7o";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    let currentChannel = 'general';
    let messages = [];
    
    // Check if logged in
    if (!currentUser || currentUser.username === 'Guest') {
      alert('please log in to use fantarena!');
      window.location.href = 'fantaccount.html';
    }
    
    // Load messages
    async function loadMessages() {
      const { data, error } = await supabase
        .from('fantarena_messages')
        .select('*')
        .eq('channel_id', currentChannel)
        .order('created_at', { ascending: true })
        .limit(100);
      
      if (data) {
        messages = data;
        renderMessages();
      }
    }
    
    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      if (messages.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4);">no messages yet. say something!</div>';
        return;
      }
      
      container.innerHTML = messages.map(msg => `
        <div class="message">
          <div class="message-avatar">${msg.username[0].toUpperCase()}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-name">${msg.username}</span>
              <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
            </div>
            <div class="message-text">${escapeHtml(msg.message)}</div>
          </div>
        </div>
      `).join('');
      
      container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Send message
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      
      const { error } = await supabase
        .from('fantarena_messages')
        .insert({
          channel_id: currentChannel,
          user_id: currentUser.id,
          username: currentUser.displayName || currentUser.username,
          message: message
        });
      
      if (error) console.error('Send error:', error);
      input.value = '';
    }
    
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    
    // Realtime subscription
    supabase
      .channel('fantarena')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'fantarena_messages', filter: `channel_id=eq.${currentChannel}` }, payload => {
        messages.push(payload.new);
        if (messages.length > 100) messages.shift();
        renderMessages();
      })
      .subscribe();
    
    // Channel switching
    document.querySelectorAll('.server-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentChannel = item.dataset.channel;
        document.getElementById('channelName').textContent = currentChannel;
        messages = [];
        loadMessages();
      });
    });
    
    // Start
    loadMessages();
    console.log('🏟️ Fantarena loaded!');
  </script>
</body>
</html>
