<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .chat-container { width: 100%; max-width: 700px; height: 85vh; background: rgba(20,30,50,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(45,90,227,0.4); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .chat-header { padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .chat-title { font-size: 20px; font-weight: bold; color: #ffcc00; display: flex; align-items: center; gap: 8px; }
    .clear-btn { background: rgba(220,50,50,0.2); border: 1px solid rgba(220,50,50,0.4); border-radius: 30px; padding: 6px 14px; color: #ff8888; font-size: 12px; cursor: pointer; }
    .messages-container { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 18px; }
    .message { display: flex; gap: 12px; max-width: 85%; animation: slideIn 0.2s ease; }
    .ai-message { align-self: flex-start; }
    .user-message { align-self: flex-end; flex-direction: row-reverse; }
    .message-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .user-message .message-avatar { background: linear-gradient(135deg, #ffcc00, #ff8800); }
    .message-text { background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); font-size: 14px; line-height: 1.5; word-break: break-word; }
    .user-message .message-text { background: rgba(45,90,227,0.25); border-color: rgba(45,90,227,0.4); }
    .ai-message.typing .message-text { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); }
    .input-container { padding: 18px 22px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; }
    #messageInput { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; }
    #messageInput:focus { border-color: #ffcc00; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 30px; padding: 14px 28px; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(45,90,227,0.4); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="chat-title">🤖 fanter ai</span>
      <button class="clear-btn" onclick="clearChat()">clear</button>
    </div>
    
    <div class="messages-container" id="messagesContainer">
      <div class="message ai-message">
        <div class="message-avatar">🤖</div>
        <div class="message-text">yo! i'm fanter ai. what's good?</div>
      </div>
    </div>
    
    <div class="input-container">
      <input type="text" id="messageInput" placeholder="type something..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">send</button>
    </div>
  </div>

  <script>
    // ===== FANTER AI CHAT =====
    window.messages = [];
    window.isWaiting = false;

    // Groq settings
    const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE"; // Replace with your key
    const AI_MODEL = 'llama-3.1-8b-instant';

    const SYSTEM_PROMPT = `you are fanter ai, a chill gaming assistant on a game site called fanter. talk like a cool friend - use lowercase mostly, keep responses short (1-3 sentences). dont overuse emojis. be helpful but casual.`;

    // ===== LOAD MESSAGES =====
    function loadMessages() {
      const saved = localStorage.getItem('fanter_chat');
      if (saved) {
        window.messages = JSON.parse(saved);
      } else {
        window.messages = [{ sender: 'ai', text: 'yo! i\'m fanter ai. what\'s good?', timestamp: Date.now() }];
        localStorage.setItem('fanter_chat', JSON.stringify(window.messages));
      }
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = window.messages.map(msg => `
        <div class="message ${msg.sender}-message">
          <div class="message-avatar">${msg.sender === 'ai' ? '🤖' : '👤'}</div>
          <div class="message-text">${escapeHtml(msg.text)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(sender, text) {
      window.messages.push({ sender, text, timestamp: Date.now() });
      if (window.messages.length > 50) window.messages = window.messages.slice(-50);
      localStorage.setItem('fanter_chat', JSON.stringify(window.messages));
      renderMessages();
    }

    function showTypingIndicator() {
      const container = document.getElementById('messagesContainer');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message ai-message typing';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `<div class="message-avatar">🤖</div><div class="message-text">typing...</div>`;
      container.appendChild(typingDiv);
      container.scrollTop = container.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    // ===== CALL GROQ =====
    async function callGroq(userMessage) {
      try {
        const conversationHistory = window.messages.slice(-6).map(m => ({
          role: m.sender === 'ai' ? 'assistant' : 'user',
          content: m.text
        }));

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: AI_MODEL,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              ...conversationHistory,
              { role: 'user', content: userMessage }
            ],
            max_tokens: 150,
            temperature: 0.7
          })
        });

        if (!response.ok) {
          return 'connection issue, try again in a sec';
        }

        const data = await response.json();
        return data.choices[0]?.message?.content || 'hmm i blanked out';

      } catch (error) {
        return 'connection issue, maybe refresh?';
      }
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const message = input.value.trim();
      
      if (!message || window.isWaiting) return;

      addMessage('user', message);
      input.value = '';

      window.isWaiting = true;
      input.disabled = true;
      sendBtn.disabled = true;

      showTypingIndicator();

      const aiResponse = await callGroq(message);

      removeTypingIndicator();
      addMessage('ai', aiResponse);

      window.isWaiting = false;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }

    // ===== CLEAR CHAT =====
    function clearChat() {
      if (confirm('clear the whole chat?')) {
        window.messages = [{ sender: 'ai', text: 'yo! i\'m fanter ai. what\'s good?', timestamp: Date.now() }];
        localStorage.setItem('fanter_chat', JSON.stringify(window.messages));
        renderMessages();
      }
    }

    // Make functions global
    window.sendMessage = sendMessage;
    window.clearChat = clearChat;

    // Start
    loadMessages();
    console.log('✅ Fanter AI ready');
  </script>
</body>
</html>
