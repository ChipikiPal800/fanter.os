<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      font-family: 'Ubuntu', sans-serif;
      min-height: 100vh;
    }
    .debug-panel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 10px;
      border-radius: 8px;
      z-index: 9999;
      max-height: 150px;
      overflow-y: auto;
      pointer-events: none;
    }
    .game-layout { display: flex; height: 100vh; }
    
    /* Side Menu */
    .game-sidebar {
      width: 280px;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(45, 90, 227, 0.3);
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }
    
    .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 18px; }
    
    .sidebar-card {
      background: rgba(20, 30, 50, 0.6);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 16px;
      margin: 15px;
      padding: 15px;
    }
    .card-icon { font-size: 24px; margin-bottom: 10px; text-align: center; }
    .card-title { font-size: 12px; color: #ffcc00; text-align: center; }
    .coin-amount { font-size: 28px; font-weight: bold; color: #ffcc00; text-align: center; }
    .coin-label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; }
    .playtime-value { font-size: 20px; font-weight: bold; color: #2d5ae3; text-align: center; }
    .game-name-display { text-align: center; font-size: 14px; color: white; }
    .sidebar-btn {
      width: 100%;
      background: rgba(45, 90, 227, 0.2);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    /* Main Game Area */
    .game-main {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .game-container {
      width: 100%;
      max-width: 1100px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      overflow: hidden;
    }
    .game-header {
      background: rgba(10, 15, 30, 0.8);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .game-name { font-size: 16px; font-weight: bold; color: #ffcc00; }
    .game-control-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 20px;
      padding: 5px 12px;
      color: white;
      cursor: pointer;
    }
    .game-wrapper { aspect-ratio: 16 / 9; width: 100%; background: #000; }
    .game-frame { width: 100%; height: 100%; border: none; }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(45, 90, 227, 0.3);
      border-top: 3px solid #2d5ae3;
      border-right: 3px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { color: #00ff88; font-family: 'Orbitron', monospace; font-size: 14px; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">LOADING GAME...</div>
  </div>

  <!-- Debug Panel -->
  <div class="debug-panel" id="debugPanel"></div>

  <div class="game-layout">
    <div class="game-sidebar">
      <div class="sidebar-header"><h2>fanter</h2></div>
      <div class="sidebar-content">
        <div class="sidebar-card">
          <div class="card-icon">🎮</div>
          <div class="card-title">now playing</div>
          <div class="game-name-display" id="gameNameDisplay">Loading...</div>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">🪙</div>
          <div class="card-title">your coins</div>
          <div class="coin-amount" id="coinAmount">0</div>
          <div class="coin-label">+0.01 per second</div>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">⏱️</div>
          <div class="card-title">session time</div>
          <div class="playtime-value" id="playtimeDisplay">00:00:00</div>
        </div>
        <div class="sidebar-card">
          <button class="sidebar-btn" onclick="window.location.href='index.html'">← back to games</button>
        </div>
      </div>
    </div>
    
    <div class="game-main">
      <div class="game-container">
        <div class="game-header">
          <span class="game-name" id="gameTitle">Loading...</span>
          <div class="game-controls">
            <button class="game-control-btn" id="refreshBtn">🔄 refresh</button>
            <button class="game-control-btn" onclick="window.location.href='index.html'">← back</button>
          </div>
        </div>
        <div class="game-wrapper">
          <iframe class="game-frame" id="gameFrame" src="about:blank"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    function debugLog(msg) {
      const panel = document.getElementById('debugPanel');
      if (panel) {
        panel.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        panel.scrollTop = panel.scrollHeight;
      }
      console.log(msg);
    }
    
    debugLog("=== PLAY PAGE LOADED ===");
    
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    
    debugLog(`Raw gameUrl: "${gameUrl}"`);
    debugLog(`Raw gameName: "${gameName}"`);
    
    const decodedGameName = decodeURIComponent(gameName);
    debugLog(`Decoded gameName: "${decodedGameName}"`);
    
    // Update UI
    document.getElementById('gameTitle').textContent = decodedGameName;
    document.getElementById('gameNameDisplay').textContent = decodedGameName;
    document.getElementById('loadingText').textContent = `LOADING ${decodedGameName.toUpperCase()}...`;
    
    if (!gameUrl || gameUrl === 'undefined' || gameUrl === 'null' || gameUrl === '') {
      debugLog("ERROR: No game URL provided!");
      document.getElementById('gameFrame').outerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:#ff4444;padding:40px;text-align:center;">
          <div>
            <h2>😵 Game URL Not Found</h2>
            <p>No game URL was provided in the link.</p>
            <p>Expected format: play.html?gameurl=GAME_URL&game=GAME_NAME</p>
            <button onclick="window.location.href='index.html'">← Back to Games</button>
          </div>
        </div>
      `;
      document.getElementById('loadingOverlay').classList.add('hide');
    } else {
      // Determine URL type
      const isExternal = gameUrl.startsWith('http://') || gameUrl.startsWith('https://');
      debugLog(`Is external URL: ${isExternal}`);
      
      let finalUrl;
      if (isExternal) {
        finalUrl = gameUrl;
        debugLog(`Using external URL directly: ${finalUrl}`);
      } else {
        // Remove trailing slash if present
        let cleanUrl = gameUrl.replace(/\/$/, '');
        finalUrl = `https://gms.parcoil.com/${cleanUrl}`;
        debugLog(`Internal game - built CDN URL: ${finalUrl}`);
      }
      
      const gameFrame = document.getElementById('gameFrame');
      const loadingOverlay = document.getElementById('loadingOverlay');
      
      function onGameLoad() {
        debugLog("✅ Iframe onload event fired - game loaded!");
        loadingOverlay.classList.add('hide');
      }
      
      function onGameError() {
        debugLog("❌ Iframe error event - game failed to load!");
        debugLog(`Failed URL: ${finalUrl}`);
        loadingOverlay.classList.add('hide');
        document.getElementById('gameFrame').outerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:#ffcc00;padding:40px;text-align:center;">
            <div>
              <h2>⚠️ Game Failed to Load</h2>
              <p>The game at <strong>${finalUrl}</strong> could not be loaded.</p>
              <p>This could be because:</p>
              <ul style="text-align:left;margin-top:10px;">
                <li>The game URL is incorrect</li>
                <li>The website blocks embedding (X-Frame-Options)</li>
                <li>The game server is down</li>
              </ul>
              <button onclick="window.open('${finalUrl}', '_blank')" style="margin-top:15px;padding:8px 16px;background:#2d5ae3;border:none;border-radius:20px;color:white;cursor:pointer;">🎮 Open in New Tab</button>
              <button onclick="window.location.href='index.html'" style="margin-top:15px;margin-left:10px;padding:8px 16px;background:#333;border:none;border-radius:20px;color:white;cursor:pointer;">← Back</button>
            </div>
          </div>
        `;
      }
      
      gameFrame.onload = onGameLoad;
      gameFrame.onerror = onGameError;
      gameFrame.src = finalUrl;
      debugLog(`Setting iframe src to: ${finalUrl}`);
      
      // Timeout fallback
      setTimeout(() => {
        if (loadingOverlay && !loadingOverlay.classList.contains('hide')) {
          debugLog("⚠️ Timeout - game taking too long to load");
          onGameError();
        }
      }, 10000);
      
      // Track game play for achievements
      if (typeof window.trackPlayedGame === 'function') {
        window.trackPlayedGame(decodedGameName);
        debugLog("Tracked played game for achievements");
      }
      
      // ===== COIN SYSTEM =====
      let sessionStartTime = Date.now();
      let totalCoinsEarned = 0;
      let coinInterval = null;
      let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      
      function updateCoinDisplay() {
        const coinEl = document.getElementById('coinAmount');
        if (coinEl) coinEl.textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
      
      function updatePlaytimeDisplay() {
        const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const hours = Math.floor(elapsedSeconds / 3600);
        const minutes = Math.floor((elapsedSeconds % 3600) / 60);
        const seconds = elapsedSeconds % 60;
        const display = document.getElementById('playtimeDisplay');
        if (display) display.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
      
      function saveUserCoins() {
        if (!currentUser) return;
        currentUser.coins = totalCoinsEarned;
        localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      }
      
      function startCoinEarning() {
        if (coinInterval) clearInterval(coinInterval);
        coinInterval = setInterval(() => {
          if (!document.hidden) {
            totalCoinsEarned += 0.01;
            updateCoinDisplay();
            saveUserCoins();
          }
        }, 1000);
      }
      
      if (currentUser && currentUser.coins !== undefined) totalCoinsEarned = currentUser.coins;
      updateCoinDisplay();
      setInterval(updatePlaytimeDisplay, 1000);
      startCoinEarning();
      
      // Refresh button
      document.getElementById('refreshBtn').onclick = () => {
        debugLog("Refresh button clicked - reloading game");
        loadingOverlay.classList.remove('hide');
        gameFrame.src = finalUrl;
      };
    }
  </script>
</body>
</html>
