<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IodineGBA - Aladdin Test</title>
    <style>
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        canvas { border: 2px solid #7c5cff; border-radius: 12px; box-shadow: 0 0 20px rgba(124,92,255,0.3); }
        .info { text-align: center; margin-top: 20px; color: #a0a0c0; font-family: monospace; }
    </style>
</head>
<body>
    <div>
        <canvas id="gameCanvas" width="240" height="160" style="width: 100%; max-width: 480px; height: auto; image-rendering: crisp-edges;"></canvas>
        <div class="info">
            ✅ IodineGBA loaded | Aladdin (GBA)
        </div>
    </div>

    <script src="https://chipikipal800.github.io/MKGBA2.0/IodineGBA/core/Emulator.js"></script>
    <script>
        // ROM URL (Aladdin)
        const ROM_URL = 'https://chipikipal800.github.io/MKGBA2.0/Binaries/aladdin.gba';
        // BIOS file (required for GBA emulation)
        const BIOS_URL = 'https://chipikipal800.github.io/MKGBA2.0/IodineGBA/bios/gba_bios.bin';

        let emulator = new GameBoyAdvanceEmulator();
        
        // Fetch BIOS and ROM, then start emulator
        Promise.all([
            fetch(BIOS_URL).then(res => res.arrayBuffer()),
            fetch(ROM_URL).then(res => res.arrayBuffer())
        ]).then(([biosData, romData]) => {
            // Convert to Uint8Array (IodineGBA expects this format)
            const bios = new Uint8Array(biosData);
            const rom = new Uint8Array(romData);
            
            // Attach BIOS and ROM
            emulator.attachBIOS(bios);
            emulator.attachROM(rom);
            
            // Set up graphics output
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(240, 160);
            
            emulator.attachGraphicsFrameHandler((frameBuffer) => {
                // frameBuffer is an array of RGB values (R,G,B per pixel)
                for (let i = 0; i < 240 * 160; i++) {
                    imageData.data[i * 4] = frameBuffer[i * 3];     // R
                    imageData.data[i * 4 + 1] = frameBuffer[i * 3 + 1]; // G
                    imageData.data[i * 4 + 2] = frameBuffer[i * 3 + 2]; // B
                    imageData.data[i * 4 + 3] = 255; // Alpha
                }
                ctx.putImageData(imageData, 0, 0);
            });
            
            // Start the emulator
            emulator.play();
            
            console.log('✅ IodineGBA emulator started!');
        }).catch(error => {
            console.error('Failed to load ROM or BIOS:', error);
            document.querySelector('.info').innerHTML = '❌ Failed to load ROM or BIOS. Check console.';
        });
    </script>
</body>
</html>
