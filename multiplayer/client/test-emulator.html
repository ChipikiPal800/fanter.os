<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>IodineGBA Test</title>
    <style>
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        canvas {
            border: 2px solid #7c5cff;
            border-radius: 12px;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="240" height="160" style="width: 480px; height: 320px;"></canvas>

    <script src="https://chipikipal800.github.io/MKGBA2.0/IodineGBA/core/Emulator.js"></script>
    <script>
        // ROM and BIOS URLs
        const ROM_URL = 'https://chipikipal800.github.io/MKGBA2.0/Binaries/aladdin.gba';
        const BIOS_URL = 'https://chipikipal800.github.io/MKGBA2.0/IodineGBA/bios/gba_bios.bin';
        
        // Create emulator instance
        const emulator = new GameBoyAdvanceEmulator();
        
        // Fetch BIOS and ROM
        fetch(BIOS_URL)
            .then(response => response.arrayBuffer())
            .then(biosData => {
                const bios = new Uint8Array(biosData);
                emulator.attachBIOS(bios);
                
                return fetch(ROM_URL);
            })
            .then(response => response.arrayBuffer())
            .then(romData => {
                const rom = new Uint8Array(romData);
                emulator.attachROM(rom);
                
                // Setup canvas drawing
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');
                const imageData = ctx.createImageData(240, 160);
                
                emulator.attachGraphicsFrameHandler((frameBuffer) => {
                    for (let i = 0; i < 240 * 160; i++) {
                        imageData.data[i * 4] = frameBuffer[i * 3];     // R
                        imageData.data[i * 4 + 1] = frameBuffer[i * 3 + 1]; // G
                        imageData.data[i * 4 + 2] = frameBuffer[i * 3 + 2]; // B
                        imageData.data[i * 4 + 3] = 255; // Alpha
                    }
                    ctx.putImageData(imageData, 0, 0);
                });
                
                // Start emulator
                emulator.play();
                console.log('Emulator started');
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to load ROM or BIOS');
            });
    </script>
</body>
</html>
