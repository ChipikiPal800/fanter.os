  <style>
    * {

      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2.6rem;
      background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      margin-bottom: 0.3rem;
    }
    .header p {
      color: #8e9bbe;
      font-size: 0.9rem;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(124, 92, 255, 0.2);
      border: 1px solid rgba(124, 92, 255, 0.3);
      border-radius: 30px;
      padding: 8px 20px;
      color: #ffdd99;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 100;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: rgba(124, 92, 255, 0.3);
      transform: translateY(-2px);
    }

    .account-container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .account-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
      flex-wrap: wrap;
    }
    .account-tab {
      background: none;
      border: none;
      color: #a0a0c0;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      border-radius: 30px;
      font-family: 'DM Sans', sans-serif;
    }
    .account-tab:hover {
      background: rgba(124, 92, 255, 0.15);
      color: #ffdd99;
    }
    .account-tab.active {
      color: #ffcc66;
      background: rgba(124, 92, 255, 0.2);
    }

    .account-tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .account-tab-content.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-info {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #7c5cff, #ffcc66);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      margin: 0 auto 16px;
      box-shadow: 0 8px 20px rgba(124, 92, 255, 0.3);
    }
    .profile-name {
      font-size: 24px;
      font-weight: 700;
      color: #f5e6c4;
      margin-bottom: 4px;
    }
    .profile-username {
      color: #a0a0c0;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .profile-coins {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc66;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.3);
      padding: 6px 16px;
      border-radius: 40px;
    }
    .sync-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 11px;
      margin-left: 10px;
      background: rgba(0,0,0,0.3);
    }
    .sync-status.online { background: rgba(76, 217, 100, 0.2); color: #4cd964; }
    .sync-status.offline { background: rgba(255, 165, 0, 0.2); color: #ffa500; }

    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 12px 24px;
      border-radius: 20px;
      min-width: 100px;
    }
    .stat-number {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc66;
      font-family: monospace;
    }
    .stat-label {
      font-size: 11px;
      color: #a0a0c0;
      margin-top: 4px;
    }

    .profile-games-section {
      margin-top: 24px;
    }
    .profile-games-section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #ffcc66;
      letter-spacing: 1px;
    }
    .profile-game-tag {
      display: inline-block;
      background: rgba(124, 92, 255, 0.2);
      border: 1px solid rgba(124, 92, 255, 0.3);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      margin: 4px;
      transition: all 0.2s;
    }
    .profile-game-tag.favorite {
      background: rgba(255, 204, 102, 0.15);
      border-color: rgba(255, 204, 102, 0.4);
      color: #ffdd99;
    }

    .account-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    .account-form input {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .account-form input:focus {
      border-color: #ffcc66;
      box-shadow: 0 0 10px rgba(255, 204, 102, 0.2);
    }
    .account-form button {
      background: linear-gradient(135deg, #7c5cff, #5a3cc9);
      border: none;
      border-radius: 30px;
      padding: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .account-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(124, 92, 255, 0.4);
    }

    .settings-btn {
      background: linear-gradient(135deg, #7c5cff, #5a3cc9);
      border: none;
      border-radius: 30px;
      padding: 10px 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .settings-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(124, 92, 255, 0.4);
    }
    .logout-btn {
      background: rgba(220, 50, 50, 0.2);
      border: 1px solid rgba(220, 50, 50, 0.3);
    }
    .logout-btn:hover {
      background: rgba(220, 50, 50, 0.4);
      box-shadow: 0 5px 15px rgba(220, 50, 50, 0.3);
    }

    .message {
      padding: 10px;
      border-radius: 30px;
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
    }
    .message.error {
      background: rgba(255, 0, 0, 0.15);
      color: #ff6666;
      border: 1px solid rgba(255, 0, 0, 0.3);
    }
    .message.success {
      background: rgba(76, 217, 100, 0.15);
      color: #4cd964;
      border: 1px solid rgba(76, 217, 100, 0.3);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 24px 0;
    }

    .leaderboard-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 8px 20px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .filter-btn.active {
      background: rgba(124, 92, 255, 0.3);
      border-color: #7c5cff;
      color: #ffcc66;
    }
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      transition: all 0.2s;
    }
    .leaderboard-item.current-user {
      background: rgba(124, 92, 255, 0.15);
      border-color: rgba(124, 92, 255, 0.3);
    }
    .rank {
      font-size: 20px;
      font-weight: bold;
      min-width: 45px;
      color: #a0a0c0;
    }
    .rank.top-1 { color: #ffcc66; text-shadow: 0 0 5px rgba(255,204,102,0.5); }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c5cff, #ffcc66);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: #f5e6c4;
    }
    .user-username {
      font-size: 11px;
      color: #a0a0c0;
    }
    .user-score {
      font-size: 18px;
      font-weight: bold;
      color: #ffcc66;
    }

    .ach-group {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .ach-group-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ach-group-header:hover {
      background: rgba(124, 92, 255, 0.05);
    }
    .ach-group-body {
      padding: 0 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ach-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      transition: all 0.2s;
    }
    .ach-item.unlocked {
      background: rgba(255, 204, 102, 0.08);
      border-left: 3px solid #ffcc66;
    }
    .ach-item-icon {
      font-size: 32px;
      min-width: 50px;
      text-align: center;
    }
    .ach-item-info {
      flex: 1;
    }
    .ach-item-name {
      font-size: 14px;
      font-weight: 600;
      color: #f5e6c4;
    }
    .ach-item-desc {
      font-size: 11px;
      color: #a0a0c0;
      margin-top: 2px;
    }
    .ach-progress-bar-wrap {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .ach-progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .ach-item-coins {
      font-size: 12px;
      color: #ffcc66;
      white-space: nowrap;
    }

    .guest-message {
      text-align: center;
      padding: 40px 20px;
      color: #a0a0c0;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .account-container {
        padding: 20px;
      }
      .profile-stats {
        gap: 15px;
      }
      .stat {
        padding: 8px 16px;
        min-width: 70px;
      }
      .stat-number {
        font-size: 20px;
      }
      .account-tab {
        padding: 6px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>

<a href="index.html" class="back-btn">← Back to OS</a>

<div class="header">
  <h1>ACCOUNT</h1>
  <p>manage your fanteros profile</p>
</div>

<div class="account-container">
  <div class="account-tabs">
    <button class="account-tab active" data-tab="profile">profile</button>
    <button class="account-tab" data-tab="achievements">achievements</button>
    <button class="account-tab" data-tab="leaderboard">leaderboard</button>
    <button class="account-tab" data-tab="login">login</button>
    <button class="account-tab" data-tab="register">register</button>
  </div>

  <div id="profileTab" class="account-tab-content active"><div id="profileContent"><div class="guest-message">loading profile...</div></div></div>
  <div id="achievementsTab" class="account-tab-content"><div id="achievementsContent"><div class="guest-message">loading achievements...</div></div></div>
  <div id="leaderboardTab" class="account-tab-content"><div id="leaderboardContent"><div class="guest-message">loading leaderboard...</div></div></div>

  <div id="loginTab" class="account-tab-content">
    <form id="loginForm" class="account-form">
      <input type="email" id="loginEmail" placeholder="email address" required>
      <input type="password" id="loginPassword" placeholder="password" required>
      <button type="submit">login</button>
      <div id="loginMessage" class="message"></div>
    </form>
    <div class="divider"></div>
    <button onclick="continueWithLocalStorage()" class="settings-btn" style="width:100%;">continue as guest with local save</button>
  </div>

  <div id="registerTab" class="account-tab-content">
    <form id="registerForm" class="account-form">
      <input type="text" id="regUsername" placeholder="username" required>
      <input type="email" id="regEmail" placeholder="email" required>
      <input type="text" id="regDisplayName" placeholder="display name (optional)">
      <input type="password" id="regPassword" placeholder="password" required>
      <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
      <button type="submit">create account</button>
      <div id="registerMessage" class="message"></div>
    </form>
  </div>
</div>

  let currentUser = null;
  let localUser = null;
  let syncStatus = 'offline';
  let currentFilter = 'coins';
  let userAchievements = {};

  function unlockAchievement(achievementId) {
    if (userAchievements[achievementId]) return false;
    
    userAchievements[achievementId] = true;
    localStorage.setItem('fanter_achievements', JSON.stringify(userAchievements));
    
    const ach = ALL_ACHIEVEMENTS.find(a => a.id === achievementId);
    if (ach && localUser) {
      localUser.coins = (localUser.coins || 0) + ach.coins;
      localStorage.setItem('fanter_currentUser', JSON.stringify(localUser));
      showAchievementNotification(ach);
      
      if (localUser.stats) {
        localUser.stats.achievementsUnlocked = Object.keys(userAchievements).length;
        localStorage.setItem('fanter_currentUser', JSON.stringify(localUser));
      }
    }
    
    if (syncStatus === 'online' && currentUser) {
      supabase.from('user_achievements').upsert({
        user_id: currentUser.id,
        achievement_id: achievementId,
        unlocked_at: new Date()
      }).then(() => console.log('achievement synced'));
    }
    
    return true;
  }

  function showAchievementNotification(ach) {
    const popup = document.createElement('div');
    popup.style.cssText = `position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,rgba(15,15,25,0.98),rgba(30,20,50,0.98));backdrop-filter:blur(15px);border-left:4px solid #ffcc66;border-radius:16px;padding:14px 22px;min-width:280px;z-index:10001;transform:translateX(400px);transition:transform 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);box-shadow:0 10px 30px rgba(0,0,0,0.5);`;
    popup.innerHTML = `
      <div style="display:flex;align-items:center;gap:15px;">
        <span style="font-size:36px;">${ach.icon}</span>
        <div>
          <div style="font-family:'Syne';font-size:11px;color:#ffcc66;letter-spacing:1px;">achievement unlocked</div>
          <div style="font-size:15px;font-weight:bold;color:white;">${ach.name}</div>
          <div style="color:#ffcc66;font-size:12px;margin-top:3px;">+${ach.coins} 🪙</div>
        </div>
      </div>
    `;
    document.body.appendChild(popup);
    setTimeout(() => popup.style.transform = 'translateX(0)', 10);
    setTimeout(() => {
      popup.style.transform = 'translateX(400px)';
      setTimeout(() => popup.remove(), 400);
    }, 4000);
  }

  async function init() {
    if (!localStorage.getItem('fanter_currentUser')) {
      const guestUser = { 
        id: 'guest_' + Date.now(), 
        username: 'Guest', 
        displayName: 'Guest', 
        coins: 300, 
        stats: { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0, achievementsUnlocked: 0 },
        favorites: [], 
        playedGames: [] 
      };
      localStorage.setItem('fanter_currentUser', JSON.stringify(guestUser));
    }

    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        syncStatus = 'online';
        await loadSupabaseData();
        if (!userAchievements[1]) unlockAchievement(1);
      } else {
        loadLocalData();
      }
    } catch (e) {
      console.log('supabase error, using local storage', e.message);
      loadLocalData();
    }

    setupTabs();
    setupLeaderboardFilters();
    updateUI();
    renderCurrentTab();
  }

  function loadLocalData() {
    localUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    userAchievements = JSON.parse(localStorage.getItem('fanter_achievements') || '{}');
    syncStatus = 'offline';
  }

  async function loadSupabaseData() {
    try {
      const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      if (profile) {
        localUser = { 
          id: profile.id, 
          username: profile.username, 
          displayName: profile.display_name || profile.username, 
          email: profile.email, 
          coins: profile.coins || 300, 
          stats: { 
            gamesPlayed: profile.games_played || 0, 
            ratingsGiven: 0, 
            favoritesCount: 0,
            achievementsUnlocked: 0
          }, 
          favorites: [], 
          playedGames: [] 
        };
        localStorage.setItem('fanter_currentUser', JSON.stringify(localUser));
      }
      const { data: achievements } = await supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
      userAchievements = {};
      achievements?.forEach(a => { userAchievements[a.achievement_id] = true; });
      localStorage.setItem('fanter_achievements', JSON.stringify(userAchievements));
    } catch (error) { 
      console.error('error loading supabase data', error); 
      loadLocalData(); 
    }
  }

  async function handleLogin(email, password) {
    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      syncStatus = 'online';
      await loadSupabaseData();
      unlockAchievement(1);
      showMessage('loginMessage', 'login successful', 'success');
      setTimeout(() => window.location.reload(), 500);
    } catch (error) {
      showMessage('loginMessage', error.message, 'error');
    }
  }

  async function handleRegister(username, email, displayName, password) {
    try {
      const { data: existingUser } = await supabase.from('profiles').select('username').ilike('username', username).single();
      if (existingUser) {
        showMessage('registerMessage', 'username already taken', 'error');
        return;
      }
      
      const { data, error } = await supabase.auth.signUp({ 
        email, 
        password, 
        options: { data: { username, display_name: displayName || username } } 
      });
      if (error) throw error;
      
      if (data.user) {
        await supabase.from('profiles').insert({ 
          id: data.user.id, 
          username: username, 
          display_name: displayName || username, 
          email: email, 
          coins: 300, 
          achievement_points: 0, 
          achievements_unlocked: 0 
        });
      }
      
      localUser = { 
        id: data.user.id, 
        username: username, 
        displayName: displayName || username, 
        email: email, 
        coins: 300, 
        stats: { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0, achievementsUnlocked: 0 },
        favorites: [], 
        playedGames: [] 
      };
      localStorage.setItem('fanter_currentUser', JSON.stringify(localUser));
      
      unlockAchievement(1);
      showMessage('registerMessage', 'account created, logging you in', 'success');
      setTimeout(async () => { await handleLogin(email, password); }, 1000);
    } catch (error) {
      showMessage('registerMessage', error.message, 'error');
    }
  }

  async function handleLogout() {
    try { await supabase.auth.signOut(); } catch(e) {}
    currentUser = null;
    localUser = null;
    syncStatus = 'offline';
    localStorage.removeItem('fanter_currentUser');
    localStorage.removeItem('fanter_achievements');
    const guestUser = { 
      id: 'guest_' + Date.now(), 
      username: 'Guest', 
      displayName: 'Guest', 
      coins: 300, 
      stats: { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0, achievementsUnlocked: 0 },
      favorites: [], 
      playedGames: [] 
    };
    localStorage.setItem('fanter_currentUser', JSON.stringify(guestUser));
    localUser = guestUser;
    updateUI();
    switchTab('profile');
    renderCurrentTab();
  }

  function continueWithLocalStorage() {
    loadLocalData();
    updateUI();
    switchTab('profile');
    renderCurrentTab();
  }

  function renderAchievements() {
    const container = document.getElementById('achievementsContent');
    if (!localUser) {
      container.innerHTML = `<div class="guest-message"><p>please log in to view achievements</p><button onclick="switchTab('login')" class="settings-btn" style="margin-top:15px;">log in</button></div>`;
      return;
    }
    
    const stats = localUser.stats || { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 };
    const unlockedCount = Object.keys(userAchievements).length;
    const totalCount = ALL_ACHIEVEMENTS.length;
    const pct = Math.round((unlockedCount / totalCount) * 100);
    
    const newbie = ALL_ACHIEVEMENTS.filter(a => a.id >= 1 && a.id <= 10);
    const beginner = ALL_ACHIEVEMENTS.filter(a => a.id >= 11 && a.id <= 20);
    const climbing = ALL_ACHIEVEMENTS.filter(a => a.id >= 21 && a.id <= 30);
    const difficult = ALL_ACHIEVEMENTS.filter(a => a.id >= 31 && a.id <= 40);
    const elite = ALL_ACHIEVEMENTS.filter(a => a.id >= 41 && a.id <= 50);
    const secrets = ALL_ACHIEVEMENTS.filter(a => a.id >= 51);
    
    function getProgress(a) {
      if (userAchievements[a.id]) return { done: true, current: a.required, pct: 100 };
      if (a.req === 'secret' || a.req === 'register') return { done: false, current: 0, pct: 0 };
      const val = stats[a.req] || 0;
      return { done: false, current: Math.min(val, a.required), pct: Math.min(100, Math.round((val / a.required) * 100)) };
    }
    
    function renderGroup(title, icon, color, achievements, startOpen) {
      const groupUnlocked = achievements.filter(a => userAchievements[a.id]).length;
      const groupPct = Math.round((groupUnlocked / achievements.length) * 100);
      const groupId = 'ach-group-' + title.replace(/\s+/g, '-');
      const items = achievements.map(a => {
        const p = getProgress(a);
        const isHidden = a.req === 'secret' && !p.done;
        return `
          <div class="ach-item ${p.done ? 'unlocked' : ''}">
            <div class="ach-item-icon" style="${!p.done ? 'filter:grayscale(0.5);opacity:0.7;' : ''}">${isHidden ? '❓' : a.icon}</div>
            <div class="ach-item-info">
              <div class="ach-item-name">${isHidden ? '???' : a.name}</div>
              <div class="ach-item-desc">${isHidden ? 'hidden — keep playing to discover' : a.desc}</div>
              ${p.done ? '<div style="font-size:10px;color:#ffcc66;margin-top:4px;">unlocked</div>' : ''}
              ${!p.done && !isHidden ? `
                <div class="ach-progress-bar-wrap"><div class="ach-progress-bar-fill" style="width:${p.pct}%;background:${color};"></div></div>
                <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px;">${p.current} / ${a.required}</div>
              ` : ''}
            </div>
            <div class="ach-item-coins">+${a.coins} 🪙</div>
          </div>
        `;
      }).join('');
      
      return `
        <div class="ach-group">
          <div class="ach-group-header" onclick="toggleAchievementGroup('${groupId}')">
            <div style="display:flex;align-items:center;gap:12px;">
              <span style="font-size:24px;">${icon}</span>
              <span style="font-weight:bold;color:white;">${title}</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="text-align:right;">
                <div style="font-size:11px;color:${color};">${groupUnlocked}/${achievements.length}</div>
                <div style="width:80px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;overflow:hidden;">
                  <div style="height:100%;width:${groupPct}%;background:${color};"></div>
                </div>
              </div>
              <span id="${groupId}-arrow" style="color:rgba(255,255,255,0.5);font-size:12px;">${startOpen ? '▲' : '▼'}</span>
            </div>
          </div>
          <div id="${groupId}" class="ach-group-body" style="display:${startOpen ? 'flex' : 'none'};">${items}</div>
        </div>
      `;
    }
    
    container.innerHTML = `
      <div style="margin-bottom:28px;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:20px;">
          <div>
            <div style="font-size:12px;color:#a0a0c0;margin-bottom:6px;">overall progress</div>
            <div style="width:260px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#7c5cff,#ffcc66);border-radius:3px;"></div>
            </div>
            <div style="font-size:11px;color:#a0a0c0;margin-top:4px;">${unlockedCount} of ${totalCount} unlocked (${pct}%)</div>
          </div>
          <div style="background:rgba(124,92,255,0.15);border:1px solid rgba(124,92,255,0.3);border-radius:30px;padding:8px 20px;text-align:center;">
            <div style="font-size:28px;font-weight:bold;color:#7c5cff;">${unlockedCount}</div>
            <div style="font-size:11px;color:#a0a0c0;">achievements</div>
          </div>
        </div>
      </div>
      ${renderGroup('newbie', '🌱', '#4cd964', newbie, true)}
      ${renderGroup('beginner', '📈', '#2d5ae3', beginner, false)}
      ${renderGroup('climbing', '⛰️', '#ff8800', climbing, false)}
      ${renderGroup('difficult', '💀', '#ff4444', difficult, false)}
      ${renderGroup('elite', '👑', '#ffcc66', elite, false)}
      ${renderGroup('secrets', '🔮', '#aa44ff', secrets, false)}
    `;
  }
  
  window.toggleAchievementGroup = function(groupId) {
    const body = document.getElementById(groupId);
    const arrow = document.getElementById(groupId + '-arrow');
    if (body && arrow) {
      if (body.style.display === 'none' || body.style.display === '') {
        body.style.display = 'flex';
        arrow.textContent = '▲';
      } else {
        body.style.display = 'none';
        arrow.textContent = '▼';
      }
    }
  };

  async function renderLeaderboard() {
    const container = document.getElementById('leaderboardList');
    container.innerHTML = '<div class="guest-message">loading leaderboard...</div>';
    let players = [];

    try {
      const orderCol = currentFilter === 'coins' ? 'coins' : 'achievement_points';
      const { data, error } = await supabase.from('profiles').select('id, username, display_name, coins, achievement_points').order(orderCol, { ascending: false }).limit(50);
      if (!error && data && data.length > 0) {
        players = data.map(p => ({ 
          id: p.id, 
          displayName: p.display_name || p.username || 'unknown', 
          username: p.username || 'unknown', 
          coins: p.coins || 0, 
          achievementsCount: p.achievement_points || 0,
          isLocal: false 
        }));
      }
    } catch (e) { console.warn('supabase error', e.message); }

    if (players.length === 0) {
      const localUsers = JSON.parse(localStorage.getItem('fanter_users') || '[]');
      players = localUsers.map(u => ({ 
        id: u.id, 
        displayName: u.displayName || u.username || 'user', 
        username: u.username || 'user', 
        coins: u.coins || 0, 
        achievementsCount: Object.keys(JSON.parse(localStorage.getItem('fanter_achievements') || '{}')).length,
        isLocal: true 
      }));
      if (localUser && !players.find(p => p.id === localUser.id)) {
        players.push({ 
          id: localUser.id, 
          displayName: localUser.displayName || localUser.username || 'you', 
          username: localUser.username || 'you', 
          coins: localUser.coins || 0, 
          achievementsCount: Object.keys(userAchievements).length,
          isLocal: true 
        });
      }
      players.sort((a, b) => currentFilter === 'coins' ? b.coins - a.coins : b.achievementsCount - a.achievementsCount);
    }

    if (players.length === 0) {
      container.innerHTML = '<div class="guest-message">no players yet — be the first</div>';
      return;
    }

    const rankIcons = ['🥇', '🥈', '🥉'];
    const currentUserId = localUser ? localUser.id : (currentUser ? currentUser.id : null);

    container.innerHTML = players.slice(0, 100).map((player, idx) => {
      const rank = idx + 1;
      const rankDisplay = rank <= 3 ? rankIcons[rank - 1] : `#${rank}`;
      const isMe = currentUserId && player.id === currentUserId;
      const scoreValue = currentFilter === 'coins' ? `🪙 ${Math.floor(player.coins * 100) / 100}` : `🏆 ${player.achievementsCount || 0}`;
      return `
        <div class="leaderboard-item ${isMe ? 'current-user' : ''}">
          <div class="rank ${rank===1?'top-1':rank===2?'top-2':rank===3?'top-3':''}">${rankDisplay}</div>
          <div class="user-avatar">${(player.displayName || 'U')[0].toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${escapeHtml(player.displayName)} ${isMe ? '<span style="font-size:11px;color:#ffcc66;">(you)</span>' : ''}</div>
            <div class="user-username">@${escapeHtml(player.username)}${player.isLocal ? ' · local' : ''}</div>
          </div>
          <div class="user-score">${scoreValue}</div>
        </div>
      `;
    }).join('');
  }

  function setupTabs() {
    document.querySelectorAll('.account-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
    });
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    });
    document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('regPassword').value;
      if (pw !== document.getElementById('regConfirmPassword').value) {
        showMessage('registerMessage', 'passwords do not match', 'error');
        return;
      }
      await handleRegister(
        document.getElementById('regUsername').value,
        document.getElementById('regEmail').value,
        document.getElementById('regDisplayName').value,
        pw
      );
    });
  }

  function setupLeaderboardFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderLeaderboard();
      });
    });
  }

  function switchTab(tabName) {
    document.querySelectorAll('.account-tab').forEach(t => {
      t.classList.toggle('active', t.getAttribute('data-tab') === tabName);
    });
    document.querySelectorAll('.account-tab-content').forEach(c => {
      c.classList.toggle('active', c.id === `${tabName}Tab`);
    });
    renderCurrentTab();
  }

  function renderCurrentTab() {
    const active = document.querySelector('.account-tab-content.active');
    if (!active) return;
    if (active.id === 'profileTab') renderProfile();
    else if (active.id === 'achievementsTab') renderAchievements();
    else if (active.id === 'leaderboardTab') renderLeaderboard();
  }

  function updateUI() {
    const nameEl = document.getElementById('accountName');
    if (nameEl && localUser) {
      nameEl.textContent = localUser.displayName || localUser.username || 'user';
    }
    document.querySelectorAll('.account-tab').forEach(t => {
      const tabName = t.getAttribute('data-tab');
      if (tabName === 'login' || tabName === 'register') {
        t.style.display = (localUser && localUser.username === 'Guest') ? 'block' : 'none';
      }
    });
  }

  function showMessage(elId, msg, type) {
    const el = document.getElementById(elId);
    if (el) {
      el.textContent = msg;
      el.className = `message ${type}`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  window.switchTab = switchTab;
  window.handleLogout = handleLogout;
  window.continueWithLocalStorage = continueWithLocalStorage;
